<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Клетъчна игра 🧫</title>

<style>
body { text-align: center; font-family: Arial; background: #eef; }

.game {
    position: relative;
    display: inline-block;
}

img {
    width: 600px;
}

/* drop зони */
.zone {
    position: absolute;
    border: 2px dashed transparent;
}

/* растителна зона */
#plantZone {
    left: 50px;
    top: 100px;
    width: 200px;
    height: 250px;
}

/* животинска зона */
#animalZone {
    right: 50px;
    top: 100px;
    width: 200px;
    height: 250px;
}

.part {
    background: lightgreen;
    padding: 10px;
    margin: 5px;
    display: inline-block;
    cursor: grab;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🧫 Постави частите правилно</h1>

<div class="game">
    <img src="ChatGPT Image 19.03.2026 г., 07_23_16.png">

    <div id="plantZone" class="zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div id="animalZone" class="zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
</div>

<br>

<div>
    <div class="part" draggable="true" ondragstart="drag(event)" id="wall">Клетъчна стена</div>
    <div class="part" draggable="true" ondragstart="drag(event)" id="chloroplast">Хлоропласт</div>
    <div class="part" draggable="true" ondragstart="drag(event)" id="vacuole">Голяма вакуола</div>
    <div class="part" draggable="true" ondragstart="drag(event)" id="nucleus">Ядро</div>
</div>

<p id="result"></p>

<script>
function allowDrop(ev) {
    ev.preventDefault();
}

function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
    ev.preventDefault();
    let data = ev.dataTransfer.getData("text");
    let element = document.getElementById(data);

    ev.target.appendChild(element);

    check();
}

function check() {
    let plant = document.getElementById("plantZone").innerText;
    let animal = document.getElementById("animalZone").innerText;

    let correct = 0;

    if (plant.includes("Клетъчна стена")) correct++;
    if (plant.includes("Хлоропласт")) correct++;
    if (plant.includes("Голяма вакуола")) correct++;

    if (animal.includes("Ядро")) correct++;

    if (correct === 4) {
        document.getElementById("result").innerHTML = "🎉 Браво! Позна всички!";
    }
}
</script>

</body>
</html>
